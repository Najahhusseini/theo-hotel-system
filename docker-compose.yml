services:
  postgres:
    image: postgres:15
    container_name: theo_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-theo_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-theo_password}
      POSTGRES_DB: ${POSTGRES_DB:-theo_database}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - theo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-theo_admin} -d ${POSTGRES_DB:-theo_database}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: theo_redis
    command: redis-server --appendonly yes --save 900 1 --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - theo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: theo_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-theo_admin}:${POSTGRES_PASSWORD:-theo_password}@postgres:5432/${POSTGRES_DB:-theo_database}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - theo_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  adminer:
    image: adminer:latest
    container_name: theo_adminer
    ports:
      - "8080:8080"
    networks:
      - theo_network
    depends_on:
      - postgres

networks:
  theo_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: